name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout llama.cpp with STQ kernel (PR #22836)
        run: |
          git clone --depth=1 https://github.com/ggml-org/llama.cpp.git app/src/main/cpp/llama.cpp
          cd app/src/main/cpp/llama.cpp
          git fetch origin pull/22836/head:stq
          git checkout stq

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12"

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HyTranslator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
